services:
  postgres:
    image: postgres:16-alpine
    container_name: ${PG_CONTAINER_NAME:-hermes-pg}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aipresales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aipresales}
      POSTGRES_DB: ${POSTGRES_DB:-aipresales}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${PG_DATA_DIR:-./pg_data}:/var/lib/postgresql/data
      - ./packages/server/src/db/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aipresales} -d ${POSTGRES_DB:-aipresales}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-hermes-redis}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./redis_data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hermes-agent:
    image: ${HERMES_AGENT_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: ${HERMES_AGENT_CONTAINER_NAME:-hermes-agent}
    entrypoint: ["/opt/hermes/.venv/bin/hermes"]
    command: ["gateway", "run"]
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes_data}:/opt/data
      - ${HERMES_PROFILE_CONTENT_DIR:-./hermes_data/profiles/jingdigital/content}:/opt/data/profiles/${HERMES_PROFILE_NAME:-jingdigital}/content
    environment:
      - HERMES_ALLOW_ROOT_GATEWAY=1
      - API_SERVER_ENABLED=${API_SERVER_ENABLED:-true}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-changeme-set-a-strong-key}
      - API_SERVER_CORS_ORIGINS=${API_SERVER_CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8642/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  hermes-bridge:
    image: ${WEBUI_IMAGE:-hermes-web-ui-local:latest}
    container_name: ${HERMES_BRIDGE_CONTAINER_NAME:-hermes-bridge}
    entrypoint: ["python3"]
    command:
      - /bridge/hermes_bridge.py
      - --endpoint
      - tcp://0.0.0.0:18765
      - --hermes-home
      - /opt/data
    ports:
      - "${HERMES_BRIDGE_PORT:-18765}:18765"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes_data}:/opt/data
      - ${HERMES_PROFILE_CONTENT_DIR:-./hermes_data/profiles/jingdigital/content}:/opt/data/profiles/${HERMES_PROFILE_NAME:-jingdigital}/content
      - ./packages/server/src/services/hermes/agent-bridge/hermes_bridge.py:/bridge/hermes_bridge.py:ro
    environment:
      - HERMES_HOME=/opt/data
      - HERMES_AGENT_BRIDGE_ENDPOINT=tcp://0.0.0.0:18765
      - HERMES_AGENT_BRIDGE_WORKER_TRANSPORT=tcp
      - HERMES_ALLOW_ROOT_GATEWAY=1
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1',18765),2); s.close()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      hermes-agent:
        condition: service_healthy
    restart: unless-stopped

  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${HERMES_AGENT_IMAGE:-nousresearch/hermes-agent:latest}
    image: ${WEBUI_IMAGE:-hermes-web-ui-local:latest}
    container_name: ${WEBUI_CONTAINER_NAME:-hermes-webui}
    ports:
      - "${PORT:-6060}:${PORT:-6060}"
      - "${PREVIEW_FRONTEND_PORT:-8651}:8651"
      - "${XAI_OAUTH_PORT:-56121}:56121"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes_data}:/home/agent/.hermes
      - ${HERMES_DATA_DIR:-./hermes_data}/hermes-web-ui:/home/agent/.hermes-web-ui
      - ${HERMES_PROFILE_CONTENT_DIR:-./hermes_data/profiles/jingdigital/content}:/home/agent/.hermes/profiles/${HERMES_PROFILE_NAME:-jingdigital}/content
    environment:
      - PORT=${PORT:-6060}
      - BIND_HOST=${BIND_HOST:-0.0.0.0}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=${HERMES_BIN:-/opt/hermes/.venv/bin/hermes}
      - HERMES_WEB_UI_DISABLE_GATEWAY_AUTOSTART=1
      - GATEWAY_HOST=${GATEWAY_HOST:-hermes-agent}
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
      - HERMES_OPENROUTER_APP_TITLE=${HERMES_OPENROUTER_APP_TITLE:-aipresales}
      - DATABASE_URL=${DATABASE_URL:-postgresql://aipresales:aipresales@postgres:5432/aipresales}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-aipresales}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aipresales}
      - POSTGRES_DB=${POSTGRES_DB:-aipresales}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Chat/presales agent bridge runs in hermes-bridge; webui only attaches.
      - HERMES_AGENT_BRIDGE_ENDPOINT=tcp://hermes-bridge:18765
      - HERMES_AGENT_BRIDGE_EXTERNAL=1
      - HERMES_AGENT_BRIDGE_WORKER_TRANSPORT=tcp
      - HERMES_WEB_UI_HOME=/home/agent/.hermes-web-ui
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PORT:-6060}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes-agent:
        condition: service_healthy
      hermes-bridge:
        condition: service_healthy
    stdin_open: true
    tty: true

  presales-worker:
    image: ${WEBUI_IMAGE:-hermes-web-ui-local:latest}
    container_name: ${PRESALES_WORKER_CONTAINER_NAME:-hermes-presales-worker}
    entrypoint: ["node"]
    command: ["dist/server/workers/presales-knowledge-worker.js"]
    volumes:
      - ${HERMES_DATA_DIR:-./hermes_data}:/home/agent/.hermes
      - ${HERMES_DATA_DIR:-./hermes_data}/hermes-web-ui:/home/agent/.hermes-web-ui
      - ${HERMES_PROFILE_CONTENT_DIR:-./hermes_data/profiles/jingdigital/content}:/home/agent/.hermes/profiles/${HERMES_PROFILE_NAME:-jingdigital}/content
      - ./dist/server/workers/presales-knowledge-worker.js:/app/dist/server/workers/presales-knowledge-worker.js:ro
    environment:
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=${HERMES_BIN:-/opt/hermes/.venv/bin/hermes}
      - HERMES_WEB_UI_HOME=/home/agent/.hermes-web-ui
      # Worker connects to the shared Hermes agent bridge service.
      - HERMES_AGENT_BRIDGE_ENDPOINT=tcp://hermes-bridge:18765
      - DATABASE_URL=${DATABASE_URL:-postgresql://aipresales:aipresales@postgres:5432/aipresales}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PRESALES_WORKER_CONCURRENCY=${PRESALES_WORKER_CONCURRENCY:-1}
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes-webui:
        condition: service_healthy
    restart: unless-stopped
